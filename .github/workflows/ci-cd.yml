name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  unit-tests:
    name: 1) Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Run Node unit tests
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run test:unit --if-present

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      - name: Run Python unit tests
        if: ${{ hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '' }}
        run: pytest -m "not e2e"

      - name: Ensure at least one unit test command ran
        run: |
          if [ ! -f package.json ] && [ ! -f requirements.txt ] && [ ! -f pyproject.toml ]; then
            echo "No Node or Python project detected. Add your test commands in this workflow."
            exit 1
          fi

  e2e-tests:
    name: 2) E2E tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Run Node E2E tests
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run test:e2e --if-present

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      - name: Run Python E2E tests
        if: ${{ hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '' }}
        run: pytest -m e2e

      - name: Ensure at least one E2E command ran
        run: |
          if [ ! -f package.json ] && [ ! -f requirements.txt ] && [ ! -f pyproject.toml ]; then
            echo "No Node or Python project detected. Add your E2E commands in this workflow."
            exit 1
          fi

  docker-build-push:
    name: 3-4) Build + Push Docker image
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found at repository root."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-azure-vm:
    name: 5) Deploy on Azure VM (SSH)
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker pull "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            docker rm -f "${{ secrets.CONTAINER_NAME }}" || true
            docker run -d \
              --name "${{ secrets.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p "${{ secrets.HOST_PORT }}:${{ secrets.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  verify-deployment:
    name: 6) Verification (healthcheck HTTP)
    needs: deploy-azure-vm
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service startup
        run: sleep 15

      - name: Verify health endpoint
        run: |
          set -e
          for i in {1..10}; do
            if curl -fsS "${{ secrets.HEALTHCHECK_URL }}" >/dev/null; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Healthcheck failed"
          exit 1
