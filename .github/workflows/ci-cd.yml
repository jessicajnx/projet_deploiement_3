name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: myapp

jobs:
  unit-tests:
    name: Job 1 - Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  e2e-tests:
    name: Job 2 - E2E tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

  docker-build-push:
    name: Job 3 - Build and push Docker image
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found at repository root."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-azure-vm:
    name: Job 4 - Deploy on Azure VM (SSH)
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update -y
                $SUDO apt-get install -y docker.io
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y docker
              else
                echo "No supported package manager found to install Docker"
                exit 1
              fi
            fi

            $SUDO systemctl enable docker || true
            $SUDO systemctl start docker || true

            if ! command -v curl >/dev/null 2>&1 && ! command -v wget >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get install -y curl
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y curl
              fi
            fi

            DOCKER_CMD="docker"
            if ! docker info >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
            fi
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | $DOCKER_CMD login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            $DOCKER_CMD pull "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            $DOCKER_CMD rm -f "${{ env.CONTAINER_NAME }}" || true
            $DOCKER_CMD run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p "${{ secrets.HOST_PORT }}:${{ secrets.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            LOCAL_OK="false"
            for i in $(seq 1 10); do
              if command -v curl >/dev/null 2>&1 && curl -fsS "http://localhost:${{ secrets.HOST_PORT }}/health" >/dev/null; then
                echo "VM local healthcheck passed"
                LOCAL_OK="true"
                break
              fi
              if command -v wget >/dev/null 2>&1 && wget -qO- "http://localhost:${{ secrets.HOST_PORT }}/health" >/dev/null; then
                echo "VM local healthcheck passed"
                LOCAL_OK="true"
                break
              fi
              echo "VM healthcheck attempt $i failed, retrying in 5s..."
              sleep 5
            done
            if [ "$LOCAL_OK" != "true" ]; then
              echo "Warning: VM local healthcheck did not pass yet, continuing to public verification step"
              $DOCKER_CMD ps || true
              $DOCKER_CMD logs --tail 120 "${{ env.CONTAINER_NAME }}" || true
            fi

      - name: Verify public endpoint from GitHub runner
        run: |
          set -e
          for i in {1..10}; do
            if curl -fsS "${{ secrets.HEALTHCHECK_URL }}" >/dev/null; then
              echo "Public healthcheck passed"
              exit 0
            fi
            echo "Public attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Public healthcheck failed"
          exit 1
